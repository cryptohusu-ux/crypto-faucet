<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Dil Öyrənmə Sistemi</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding-top: 20px; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 20px; text-align: center; border: 2px solid #58cc02; box-shadow: 0 0 20px rgba(88, 204, 2, 0.2); max-width: 400px; width: 90%; }
        h1 { color: #58cc02; margin-top: 0; }
        button { background: #58cc02; border: none; padding: 15px 30px; color: white; border-radius: 10px; cursor: pointer; font-size: 18px; margin-top: 20px; width: 100%; font-weight: bold; }
        .ad-container { margin-top: 30px; width: 100%; display: flex; justify-content: center; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Günün Sözü</h1>
        <p id="word" style="font-size: 20px;">Yüklənir...</p>
        <button onclick="getNewWord()">Növbəti Sözü Öyrən</button>
    </div>

    <div class="ad-container">
        <div id="frame" style="width: 100%; margin: auto; position: relative; z-index: 99998;">
            <iframe data-aa='2445437' src='//acceptable.a-ads.com/2445437/?size=Adaptive' 
            style='border:0; padding:0; width:100%; height:auto; overflow:hidden; display: block; margin: auto'></iframe>
        </div>
    </div>

    <script>
        async function getNewWord() {
            try {
                const res = await fetch('/get-word');
                const data = await res.json();
                document.getElementById('word').innerText = data.word + " = " + data.meaning;
            } catch (err) {
                document.getElementById('word').innerText = "Səhv baş verdi, yenidən yoxla.";
            }
        }
        getNewWord();
    </script>
</body>
</html>
